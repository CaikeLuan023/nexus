<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
    <style>
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-color); }
        .calendar-header { background: var(--bg-card); padding: 8px; text-align: center; font-weight: 600; font-size: 0.85rem; }
        .calendar-day { background: var(--bg-card); min-height: 100px; padding: 4px; position: relative; cursor: pointer; }
        .calendar-day:hover { background: var(--bg-input); }
        .calendar-day.today { border: 2px solid var(--primary-color); }
        .calendar-day.other-month { opacity: 0.4; }
        .day-number { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
        .event-dot { display: block; font-size: 0.7rem; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-calendar3 me-2"></i>Agenda</h2>
            <button class="btn btn-primary" onclick="abrirModalEvento()"><i class="bi bi-plus-lg me-1"></i>Novo Evento</button>
        </div>

        <!-- Nav Mes -->
        <div class="d-flex align-items-center justify-content-between mb-3">
            <button class="btn btn-outline-secondary btn-sm" onclick="mudarMes(-1)"><i class="bi bi-chevron-left"></i></button>
            <h4 id="agendaMesAno" class="mb-0"></h4>
            <button class="btn btn-outline-secondary btn-sm" onclick="mudarMes(1)"><i class="bi bi-chevron-right"></i></button>
        </div>

        <!-- Calendario -->
        <div class="table-container p-2">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Eventos do dia -->
        <div class="mt-3 table-container p-3" id="eventosDia" style="display:none">
            <h6 id="eventosDiaTitulo"></h6>
            <div id="eventosDiaLista"></div>
        </div>
    </main>

    <!-- Modal Evento -->
    <div class="modal fade" id="modalEvento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEventoTitulo">Novo Evento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="eventoId">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Titulo *</label>
                            <input type="text" class="form-control" id="eventoTitulo" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" id="eventoTipo">
                                <option value="evento">Evento</option>
                                <option value="reuniao">Reuniao</option>
                                <option value="visita">Visita</option>
                                <option value="treinamento">Treinamento</option>
                                <option value="lembrete">Lembrete</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Cor</label>
                            <input type="color" class="form-control form-control-color" id="eventoCor" value="#007bff">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data/Hora Inicio *</label>
                            <input type="datetime-local" class="form-control" id="eventoInicio" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data/Hora Fim</label>
                            <input type="datetime-local" class="form-control" id="eventoFim">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descricao</label>
                            <textarea class="form-control" id="eventoDescricao" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger me-auto" id="btnExcluirEvento" style="display:none" onclick="excluirEvento()"><i class="bi bi-trash"></i></button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarEvento()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/agenda.js"></script>
</body>
</html>
