<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Conhecimento - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-book me-2"></i>Base de Conhecimento</h2>
        </div>

        <!-- Busca -->
        <div class="mb-3">
            <div class="input-group" style="max-width:480px">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="kbBusca" placeholder="Buscar artigos, tutoriais, funcionalidades..." oninput="buscarArtigos()">
            </div>
            <select class="form-select d-none" id="kbFiltroCategoria" onchange="carregarArtigos()">
                <option value="">Todas as categorias</option>
            </select>
        </div>

        <!-- Categorias + Artigos -->
        <div class="row">
            <div class="col-md-3">
                <nav id="kbCategorias"><div class="text-muted small p-3">Carregando...</div></nav>
            </div>
            <div class="col-md-9">
                <div id="kbArtigos" class="row g-3">
                    <div class="text-center text-muted py-4">Carregando artigos...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Artigo -->
    <div class="modal fade" id="modalArtigo" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalArtigoTitulo">Novo Artigo</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="artigoId">
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label">Titulo *</label>
                            <input type="text" class="form-control" id="artigoTitulo" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" id="artigoCategoria"></select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Conteudo *</label>
                            <textarea class="form-control" id="artigoConteudo" rows="10" required></textarea>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Tags (separadas por virgula)</label>
                            <input type="text" class="form-control" id="artigoTags" placeholder="ex: ixc, integracao, erro">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Publicado</label>
                            <select class="form-select" id="artigoPublicado">
                                <option value="1">Sim</option>
                                <option value="0">Rascunho</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarArtigo()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Categoria -->
    <div class="modal fade" id="modalCategoria" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nova Categoria</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="categoriaId">
                    <div class="mb-3">
                        <label class="form-label">Nome *</label>
                        <input type="text" class="form-control" id="categoriaNome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Icone (Bootstrap Icons)</label>
                        <input type="text" class="form-control" id="categoriaIcone" value="bi-folder" placeholder="bi-folder">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarCategoria()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Ver Artigo -->
    <div class="modal fade" id="modalVerArtigo" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="verArtigoTitulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="verArtigoConteudo"></div>
                <div class="modal-footer">
                    <small class="text-muted me-auto" id="verArtigoMeta"></small>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/conhecimento.js"></script>
</body>
</html>
