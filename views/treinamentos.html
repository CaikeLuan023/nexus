<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinamentos - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-mortarboard me-2"></i>Treinamentos</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-danger btn-sm" onclick="window.open('/api/relatorios/treinamentos/pdf','_blank')"><i class="bi bi-file-pdf me-1"></i>PDF</button>
                <button class="btn btn-primary" onclick="abrirModalTreinamento()">
                    <i class="bi bi-plus-lg me-1"></i> Novo Treinamento
                </button>
            </div>
        </div>

        <!-- Banner de notificações de treinamentos do dia -->
        <div id="notificacoesTreinamentos" style="display:none"></div>

        <!-- Cards resumo -->
        <div class="row g-3 mb-3">
            <div class="col-6 col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(255,159,67,0.15);color:#ff9f43"><i class="bi bi-clock"></i></div>
                        <div>
                            <div class="stat-number" id="totalPendentes">0</div>
                            <div class="stat-label">Pendentes</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(67,97,238,0.15);color:#4361ee"><i class="bi bi-calendar-event"></i></div>
                        <div>
                            <div class="stat-number" id="totalAgendados">0</div>
                            <div class="stat-label">Agendados</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(46,196,182,0.15);color:#2ec4b6"><i class="bi bi-check-circle"></i></div>
                        <div>
                            <div class="stat-number" id="totalRealizados">0</div>
                            <div class="stat-label">Realizados</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:rgba(114,9,183,0.15);color:#7209b7"><i class="bi bi-mortarboard"></i></div>
                        <div>
                            <div class="stat-number" id="totalGeral">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Provedor</label>
                    <select class="form-select form-select-sm" id="filtroProvedor"><option value="">Todos</option></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Status</label>
                    <select class="form-select form-select-sm" id="filtroStatusTreinamento">
                        <option value="">Todos</option>
                        <option value="pendente">Pendente</option>
                        <option value="agendado">Agendado</option>
                        <option value="realizado">Realizado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="limparFiltros()">Limpar</button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Provedor</th>
                            <th>Título</th>
                            <th>Data</th>
                            <th>Hora</th>
                            <th>Status</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaTreinamentos">
                        <tr><td colspan="8" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Treinamento -->
    <div class="modal fade" id="modalTreinamento" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTreinamentoTitulo">Novo Treinamento</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="treinamentoId">
                    <div class="mb-3">
                        <label class="form-label">Provedor *</label>
                        <select class="form-select" id="treinamentoProvedor" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Título *</label>
                        <input type="text" class="form-control" id="treinamentoTitulo" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Data do Treinamento *</label>
                            <input type="date" class="form-control" id="treinamentoData" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Hora</label>
                            <input type="time" class="form-control" id="treinamentoHora">
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="treinamentoStatus">
                            <option value="pendente">Pendente</option>
                            <option value="agendado" selected>Agendado</option>
                            <option value="realizado">Realizado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" id="treinamentoDescricao" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarTreinamento()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/treinamentos.js"></script>
</body>
</html>
