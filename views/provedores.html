<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-people me-2"></i>Clientes</h2>
            <div class="d-flex gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-download me-1"></i> Exportar
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" onclick="exportarClientesCSV()"><i class="bi bi-filetype-csv me-2"></i>Exportar CSV</a></li>
                        <li><a class="dropdown-item" href="#" onclick="exportarClientesExcel()"><i class="bi bi-file-earmark-excel me-2"></i>Exportar Excel</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="exportarClientesPDF()"><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>Relatorio PDF</a></li>
                    </ul>
                </div>
                <button class="btn btn-primary" onclick="abrirModalCliente()">
                    <i class="bi bi-plus-lg me-1"></i> Novo Cliente
                </button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Pesquisar</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="campoPesquisa" placeholder="Buscar por nome, documento, email, telefone, ERP..." oninput="filtrarClientes()">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">ERP</label>
                    <select class="form-select form-select-sm" id="filtroErp" onchange="filtrarClientes()">
                        <option value="">Todos</option>
                        <option value="ixc">IXC</option>
                        <option value="hubsoft">Hubsoft</option>
                        <option value="sgp">SGP</option>
                        <option value="atlaz">Atlaz</option>
                        <option value="ispfy">ISPFY</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="limparFiltros()">Limpar</button>
                </div>
                <div class="col-md-4 text-end">
                    <small class="text-muted" id="totalResultados"></small>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Documento</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Endereco</th>
                            <th>ERP</th>
                            <th>Plano</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaClientes">
                        <tr><td colspan="8" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            <nav class="d-flex justify-content-between align-items-center mt-3 px-2" id="paginacao"></nav>
        </div>
    </main>

    <!-- Modal Cliente -->
    <div class="modal fade" id="modalCliente" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalClienteTitulo">Novo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="clienteId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="clienteNome" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Documento (CPF/CNPJ)</label>
                            <input type="text" class="form-control" id="clienteDocumento" placeholder="000.000.000-00">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="clienteEmail" placeholder="email@exemplo.com">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="clienteTelefone" placeholder="(00) 00000-0000">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Endereco</label>
                            <input type="text" class="form-control" id="clienteEndereco" placeholder="Rua, numero, bairro, cidade - UF">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ERP de Origem</label>
                            <select class="form-select" id="clienteERP">
                                <option value="">Nenhum (manual)</option>
                                <option value="ixc">IXC</option>
                                <option value="hubsoft">Hubsoft</option>
                                <option value="sgp">SGP</option>
                                <option value="atlaz">Atlaz</option>
                                <option value="ispfy">ISPFY</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contato WhatsApp</label>
                            <input type="text" class="form-control" id="clienteContato" placeholder="5511999998888">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observacoes</label>
                            <textarea class="form-control" id="clienteObservacoes" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarCliente()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Planos do Cliente -->
    <div class="modal fade" id="modalPlanosCliente" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-wifi me-2"></i>Planos - <span id="planosClienteNome"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="planosClienteConteudo">
                        <div class="text-center text-muted py-4">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmacao -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/provedores.js"></script>
</body>
</html>
