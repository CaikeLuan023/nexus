<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provedores - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-building me-2"></i>Provedores</h2>
            <div class="d-flex gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-success dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-download me-1"></i> Exportar
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#" onclick="exportarProvedoresCSV()"><i class="bi bi-filetype-csv me-2"></i>Exportar CSV</a></li>
                        <li><a class="dropdown-item" href="#" onclick="exportarProvedoresExcel()"><i class="bi bi-file-earmark-excel me-2"></i>Exportar Excel</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#" onclick="exportarProvedoresPDF()"><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>Relatório PDF (Todos)</a></li>
                    </ul>
                </div>
                <button class="btn btn-primary" onclick="abrirModalProvedor()">
                    <i class="bi bi-plus-lg me-1"></i> Novo Provedor
                </button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label form-label-sm">Pesquisar</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" id="campoPesquisa" placeholder="Buscar por nome, plano, modelo, ERP, responsável..." oninput="filtrarProvedores()">
                    </div>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('campoPesquisa').value=''; filtrarProvedores()">Limpar</button>
                </div>
                <div class="col-md-6 text-end">
                    <small class="text-muted" id="totalResultados"></small>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Nome</th>
                            <th>Plano</th>
                            <th>Adicionais</th>
                            <th>Modelo</th>
                            <th>ERP</th>
                            <th>Responsável</th>
                            <th>Contato</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaProvedores">
                        <tr><td colspan="9" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
            <nav class="d-flex justify-content-between align-items-center mt-3 px-2" id="paginacao"></nav>
        </div>
    </main>

    <!-- Modal Provedor -->
    <div class="modal fade" id="modalProvedor" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalProvedorTitulo">Novo Provedor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="provedorId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome *</label>
                            <input type="text" class="form-control" id="provedorNome" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contato WhatsApp</label>
                            <input type="text" class="form-control" id="provedorContato" placeholder="5511999998888">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Logo do Provedor</label>
                            <ul class="nav nav-tabs nav-tabs-sm mb-2" style="font-size:0.85rem">
                                <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#logoTabUrl">URL</a></li>
                                <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#logoTabUpload">Upload</a></li>
                            </ul>
                            <div class="tab-content">
                                <div class="tab-pane fade show active" id="logoTabUrl">
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                                        <input type="url" class="form-control" id="provedorLogoUrl" placeholder="https://exemplo.com/logo.png" oninput="previewLogo(this.value)">
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="logoTabUpload">
                                    <input type="file" class="form-control" id="provedorLogoFile" accept="image/*" onchange="previewLogoFile(this)">
                                </div>
                            </div>
                            <div id="logoPreview" class="mt-2 text-center" style="display:none">
                                <img id="logoPreviewImg" src="" alt="Preview" class="logo-preview-modal">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Plano</label>
                            <select class="form-select" id="provedorPlano">
                                <option value="">Selecione...</option>
                                <option value="zapping_lite_plus">Zapping Lite Plus</option>
                                <option value="zapping_full">Zapping Full</option>
                                <option value="liteplus_full">Lite Plus + Full</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Modelo de Integração</label>
                            <select class="form-select" id="provedorModelo">
                                <option value="">Selecione...</option>
                                <option value="bundle">Bundle</option>
                                <option value="hardbundle">Hardbundle</option>
                                <option value="reseller">Reseller</option>
                                <option value="hospitality">Hospitality</option>
                                <option value="empresas">Empresas</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ERP</label>
                            <select class="form-select" id="provedorERP">
                                <option value="">Selecione...</option>
                                <option value="ixc">IXC</option>
                                <option value="hubsoft">Hubsoft</option>
                                <option value="radius_net">Radius NET</option>
                                <option value="sgp">SGP</option>
                                <option value="atlaz">Atlaz</option>
                                <option value="ispfy">ISPFY</option>
                                <option value="mycore">MYCORE</option>
                                <option value="mk_auth">Mk-auth</option>
                                <option value="proprio">Próprio</option>
                                <option value="voalle">Voalle</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Adicionais</label>
                            <div class="d-flex flex-wrap gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="telecine" id="addTelecine">
                                    <label class="form-check-label" for="addTelecine">Telecine</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="combate" id="addCombate">
                                    <label class="form-check-label" for="addCombate">Combate</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="canais_adultos" id="addAdultos">
                                    <label class="form-check-label" for="addAdultos">Canais Adultos</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="premiere" id="addPremiere">
                                    <label class="form-check-label" for="addPremiere">Premiere</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="sportv_plus" id="addSportv">
                                    <label class="form-check-label" for="addSportv">Sportv+</label>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Responsável</label>
                            <select class="form-select" id="provedorResponsavel">
                                <option value="">Selecione...</option>
                                <option value="Aline">Aline</option>
                                <option value="Carla">Carla</option>
                                <option value="Vinicius">Vinicius</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Token de Integracao (Zapping)</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="provedorToken" placeholder="Bearer eyJ...">
                                <button class="btn btn-outline-secondary" type="button" onclick="toggleTokenVisibility()" title="Mostrar/Ocultar">
                                    <i class="bi bi-eye" id="tokenEyeIcon"></i>
                                </button>
                            </div>
                            <small class="text-muted">Token Bearer usado para consultar a API Zapping</small>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observações</label>
                            <textarea class="form-control" id="provedorObservacoes" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarProvedor()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Logo Ampliada -->
    <div class="modal fade" id="modalLogoAmpliada" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="logoAmpliadaNome"></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="logoAmpliadaImg" src="" class="img-fluid rounded" style="max-height:400px;max-width:100%">
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/provedores.js"></script>
</body>
</html>
