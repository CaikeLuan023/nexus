<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-people-fill me-2"></i>Usuarios</h2>
            <button class="btn btn-primary" onclick="abrirModalUsuario()">
                <i class="bi bi-plus-lg me-1"></i> Novo Usuario
            </button>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nome</th>
                            <th>Usuario</th>
                            <th>Perfil</th>
                            <th>Status</th>
                            <th>Criado em</th>
                            <th>Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsuarios">
                        <tr><td colspan="7" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Secao Permissoes por Perfil -->
        <div class="page-header mt-4">
            <h2><i class="bi bi-shield-lock me-2"></i>Permissoes por Perfil</h2>
            <button class="btn btn-success" onclick="salvarPermissoes()">
                <i class="bi bi-check-lg me-1"></i> Salvar Permissoes
            </button>
        </div>

        <div class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Modulo</th>
                            <th class="text-center">Analista</th>
                            <th class="text-center">Vendedor</th>
                            <th class="text-center">Admin</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaPermissoes">
                        <tr><td colspan="4" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Usuario -->
    <div class="modal fade" id="modalUsuario" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalUsuarioTitulo">Novo Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="usuarioId">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo *</label>
                        <input type="text" class="form-control" id="usuarioNome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nome de Usuario *</label>
                        <input type="text" class="form-control" id="usuarioLogin" placeholder="nome.sobrenome" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" id="labelSenha">Senha *</label>
                        <input type="password" class="form-control" id="usuarioSenha">
                        <small class="text-muted" id="senhaHint" style="display:none">Deixe em branco para manter a senha atual</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Perfil</label>
                        <select class="form-select" id="usuarioPerfil">
                            <option value="analista">Analista</option>
                            <option value="vendedor">Vendedor</option>
                            <option value="atendente">Atendente</option>
                            <option value="gestor_atendimento">Gestor de Atendimento</option>
                            <option value="gerente_noc">Gerente de NOC</option>
                            <option value="financeiro">Financeiro</option>
                            <option value="admin">Administrador</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarUsuario()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmacao -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/usuarios.js"></script>
</body>
</html>
