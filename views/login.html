<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/background-global.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Login card */
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 60px rgba(0, 210, 255, 0.06);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardEnter 0.6s ease-out;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .login-logo .logo-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 0.5rem;
        }

        .login-logo h3 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 6px;
            margin: 0;
            background: linear-gradient(135deg, #3a7bd5, #00D2FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo p {
            color: #8c8c9e;
            font-size: 0.88rem;
            margin-top: 0.3rem;
        }

        /* Form inputs */
        .login-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2d2d3f;
            margin-bottom: 0.4rem;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .login-input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0b0c0;
            font-size: 1.1rem;
            transition: color 0.2s;
            z-index: 2;
        }

        .login-input-group input {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 2.8rem;
            border: 2px solid #e8e8ef;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #f8f8fc;
            transition: all 0.25s;
            color: #2d2d3f;
        }

        .login-input-group input::placeholder { color: #b0b0c0; }

        .login-input-group input:focus {
            outline: none;
            border-color: #00B4D8;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
        }

        .login-input-group input:focus ~ .input-icon { color: #00B4D8; }

        /* Password toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #b0b0c0;
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            z-index: 2;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: #00B4D8; }

        /* Button - Orange/Gold gradient */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 158, 11, 0.4);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        /* Alert */
        .alert-login {
            display: none;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            padding: 0.7rem 1rem;
            animation: shakeIn 0.4s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 2FA Section */
        .twofa-input {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 700;
            padding: 0.8rem !important;
        }

        .twofa-hint {
            text-align: center;
            color: #8c8c9e;
            font-size: 0.82rem;
            margin-top: 0.5rem;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #f0f0f5;
        }

        .login-footer small { color: #b0b0c0; font-size: 0.75rem; }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card { margin: 1rem; padding: 2rem 1.5rem 1.5rem; }
            .login-logo .logo-icon { width: 90px; height: 90px; }
            .login-logo h3 { font-size: 1.4rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body class="nexus-bg">
    <!-- Background layers -->
    <div class="nexus-grid"></div>
    <div class="nexus-orb nexus-orb-1"></div>
    <div class="nexus-orb nexus-orb-2"></div>
    <div class="nexus-orb nexus-orb-3"></div>
    <div class="nexus-particles" id="particles"></div>

    <!-- Plexus globe watermark -->
    <svg class="nexus-globe" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#00D2FF" stroke-width="0.8" fill="none" opacity="0.6">
            <!-- Globe outline -->
            <circle cx="200" cy="200" r="160"/>
            <!-- Latitude lines -->
            <ellipse cx="200" cy="200" rx="160" ry="60"/>
            <ellipse cx="200" cy="200" rx="160" ry="120"/>
            <ellipse cx="200" cy="140" rx="130" ry="30"/>
            <ellipse cx="200" cy="260" rx="130" ry="30"/>
            <!-- Longitude lines -->
            <ellipse cx="200" cy="200" rx="60" ry="160"/>
            <ellipse cx="200" cy="200" rx="120" ry="160"/>
            <!-- Meridian -->
            <line x1="200" y1="40" x2="200" y2="360"/>
            <line x1="40" y1="200" x2="360" y2="200"/>
        </g>
        <!-- Plexus nodes on globe -->
        <g fill="#00D2FF" opacity="0.8">
            <circle cx="200" cy="40" r="3"/><circle cx="200" cy="360" r="3"/>
            <circle cx="40" cy="200" r="3"/><circle cx="360" cy="200" r="3"/>
            <circle cx="120" cy="80" r="2.5"/><circle cx="280" cy="80" r="2.5"/>
            <circle cx="120" cy="320" r="2.5"/><circle cx="280" cy="320" r="2.5"/>
            <circle cx="80" cy="140" r="2"/><circle cx="320" cy="140" r="2"/>
            <circle cx="80" cy="260" r="2"/><circle cx="320" cy="260" r="2"/>
            <circle cx="140" cy="120" r="2"/><circle cx="260" cy="120" r="2"/>
            <circle cx="140" cy="280" r="2"/><circle cx="260" cy="280" r="2"/>
            <circle cx="160" cy="200" r="2"/><circle cx="240" cy="200" r="2"/>
            <circle cx="200" cy="140" r="2"/><circle cx="200" cy="260" r="2"/>
        </g>
        <!-- Plexus connections -->
        <g stroke="#00D2FF" stroke-width="0.5" opacity="0.3">
            <line x1="120" y1="80" x2="200" y2="40"/>
            <line x1="280" y1="80" x2="200" y2="40"/>
            <line x1="120" y1="80" x2="80" y2="140"/>
            <line x1="280" y1="80" x2="320" y2="140"/>
            <line x1="80" y1="140" x2="40" y2="200"/>
            <line x1="320" y1="140" x2="360" y2="200"/>
            <line x1="120" y1="80" x2="260" y2="120"/>
            <line x1="140" y1="120" x2="240" y2="200"/>
            <line x1="80" y1="260" x2="140" y2="280"/>
            <line x1="320" y1="260" x2="260" y2="280"/>
            <line x1="120" y1="320" x2="200" y2="360"/>
            <line x1="280" y1="320" x2="200" y2="360"/>
            <line x1="140" y1="120" x2="200" y2="140"/>
            <line x1="260" y1="120" x2="200" y2="140"/>
            <line x1="160" y1="200" x2="200" y2="260"/>
            <line x1="240" y1="200" x2="200" y2="260"/>
        </g>
    </svg>

    <div class="login-card">
        <div class="login-logo">
            <!-- N logo inline (same as logo.svg) -->
            <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="ng" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#3a7bd5"/>
                        <stop offset="100%" stop-color="#00D2FF"/>
                    </linearGradient>
                    <linearGradient id="nb" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.45"/>
                        <stop offset="100%" stop-color="#00D2FF" stop-opacity="0.45"/>
                    </linearGradient>
                    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <!-- N main strokes -->
                <g stroke="url(#ng)" stroke-width="2.2" stroke-linecap="round" fill="none" filter="url(#glow)">
                    <line x1="24" y1="88" x2="24" y2="16"/>
                    <line x1="24" y1="16" x2="76" y2="88"/>
                    <line x1="76" y1="88" x2="76" y2="16"/>
                </g>
                <!-- Branch lines -->
                <g stroke="url(#nb)" stroke-width="1.2" stroke-linecap="round" fill="none">
                    <line x1="24" y1="16" x2="10" y2="5"/><line x1="24" y1="16" x2="42" y2="5"/>
                    <line x1="10" y1="5" x2="22" y2="2"/>
                    <line x1="76" y1="16" x2="58" y2="5"/><line x1="76" y1="16" x2="90" y2="5"/>
                    <line x1="90" y1="5" x2="78" y2="2"/>
                    <line x1="42" y1="5" x2="58" y2="5"/>
                    <line x1="24" y1="52" x2="10" y2="44"/>
                    <line x1="76" y1="52" x2="90" y2="44"/>
                    <line x1="40" y1="38" x2="28" y2="30"/>
                    <line x1="60" y1="66" x2="72" y2="74"/>
                    <line x1="24" y1="88" x2="12" y2="96"/>
                    <line x1="76" y1="88" x2="88" y2="96"/>
                </g>
                <!-- Arrow markers -->
                <g fill="url(#ng)" opacity="0.5">
                    <polygon points="9,4 13,2 12,7"/><polygon points="91,4 87,2 88,7"/>
                    <polygon points="21,1 24,4 18,4"/><polygon points="79,1 76,4 82,4"/>
                </g>
                <!-- Main vertex nodes -->
                <g filter="url(#glow)">
                    <circle cx="24" cy="88" r="4.5" fill="#3a7bd5"/>
                    <circle cx="24" cy="16" r="5" fill="#00B4D8"/>
                    <circle cx="76" cy="88" r="4.5" fill="#3a7bd5"/>
                    <circle cx="76" cy="16" r="5" fill="#00D2FF"/>
                </g>
                <!-- Mid nodes -->
                <circle cx="24" cy="52" r="3" fill="#00B4D8"/>
                <circle cx="76" cy="52" r="3" fill="#3a7bd5"/>
                <circle cx="50" cy="52" r="3.5" fill="#00A8CC"/>
                <circle cx="40" cy="38" r="2.5" fill="#00C2E0" opacity="0.8"/>
                <circle cx="60" cy="66" r="2.5" fill="#3a7bd5" opacity="0.8"/>
                <!-- Branch nodes -->
                <circle cx="10" cy="5" r="2.5" fill="#00D2FF" opacity="0.8"/>
                <circle cx="42" cy="5" r="2.5" fill="#00C2E0" opacity="0.8"/>
                <circle cx="58" cy="5" r="2.5" fill="#00A8CC" opacity="0.8"/>
                <circle cx="90" cy="5" r="2.5" fill="#3a7bd5" opacity="0.8"/>
                <circle cx="10" cy="44" r="2" fill="#00D2FF" opacity="0.6"/>
                <circle cx="90" cy="44" r="2" fill="#3a7bd5" opacity="0.6"/>
                <circle cx="28" cy="30" r="1.5" fill="#00C2E0" opacity="0.5"/>
                <circle cx="72" cy="74" r="1.5" fill="#3a7bd5" opacity="0.5"/>
                <circle cx="12" cy="96" r="2" fill="#3a7bd5" opacity="0.6"/>
                <circle cx="88" cy="96" r="2" fill="#3a7bd5" opacity="0.6"/>
                <circle cx="22" cy="2" r="1.5" fill="#00D2FF" opacity="0.4"/>
                <circle cx="78" cy="2" r="1.5" fill="#00D2FF" opacity="0.4"/>
            </svg>
            <h3>NEXUS</h3>
            <p>Faca login para continuar</p>
        </div>

        <div class="alert alert-danger alert-login" id="loginErro" role="alert"></div>

        <form id="loginForm" autocomplete="on">
            <div id="loginFields">
                <label class="login-label">Usuario</label>
                <div class="login-input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="inputUsuario" placeholder="seu.usuario" required autofocus autocomplete="username" maxlength="100" pattern="\S+">
                </div>

                <label class="login-label">Senha</label>
                <div class="login-input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="inputSenha" placeholder="Digite sua senha" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div id="twoFaFields" style="display:none">
                <label class="login-label"><i class="bi bi-shield-lock me-1"></i>Codigo 2FA</label>
                <div class="login-input-group">
                    <input type="text" class="twofa-input" id="input2fa" placeholder="000000" maxlength="6" autocomplete="one-time-code">
                </div>
                <p class="twofa-hint">Digite o codigo do seu app autenticador</p>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="login-footer">
            <small>Nexus &copy; 2025</small>
        </div>
    </div>

    <script>
    function toggleSenha() {
        const input = document.getElementById('inputSenha');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
        else { input.type = 'password'; icon.className = 'bi bi-eye'; }
    }

    // Floating particles
    (function() {
        const c = document.getElementById('particles');
        const colors = ['#00D2FF', '#3a7bd5', '#00B4D8', '#00A8CC'];
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'nexus-particle';
            const s = Math.random() * 4 + 2;
            p.style.width = s + 'px'; p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = (Math.random() * 12 + 8) + 's';
            p.style.animationDelay = (Math.random() * 12) + 's';
            c.appendChild(p);
        }
    })();
    </script>
    <script src="/js/login.js"></script>
</body>
</html>
