<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 40%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* Glow orbs */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .glow-orb-1 {
            width: 300px; height: 300px;
            background: rgba(255, 45, 120, 0.15);
            top: -50px; right: -50px;
            animation: orbFloat 8s ease-in-out infinite;
        }

        .glow-orb-2 {
            width: 250px; height: 250px;
            background: rgba(13, 110, 253, 0.12);
            bottom: -50px; left: -50px;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        /* Login card */
        .login-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4), 0 0 40px rgba(255, 45, 120, 0.08);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardEnter 0.6s ease-out;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .login-logo svg {
            width: 100px;
            height: 100px;
            margin-bottom: 0.8rem;
        }

        .login-logo h3 {
            font-weight: 800;
            font-size: 1.7rem;
            letter-spacing: 3px;
            color: #1a1a2e;
            margin: 0;
        }

        .login-logo p {
            color: #8c8c9e;
            font-size: 0.88rem;
            margin-top: 0.3rem;
        }

        /* Form inputs */
        .login-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #2d2d3f;
            margin-bottom: 0.4rem;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .login-input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b0b0c0;
            font-size: 1.1rem;
            transition: color 0.2s;
            z-index: 2;
        }

        .login-input-group input {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 2.8rem;
            border: 2px solid #e8e8ef;
            border-radius: 12px;
            font-size: 0.95rem;
            background: #f8f8fc;
            transition: all 0.25s;
            color: #2d2d3f;
        }

        .login-input-group input::placeholder {
            color: #b0b0c0;
        }

        .login-input-group input:focus {
            outline: none;
            border-color: #ff2d78;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(255, 45, 120, 0.1);
        }

        .login-input-group input:focus ~ .input-icon {
            color: #ff2d78;
        }

        /* Password toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #b0b0c0;
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            z-index: 2;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: #ff2d78; }

        /* Button */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #ff2d78, #e91e63);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #e91e63, #c2185b);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 45, 120, 0.4);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(255, 45, 120, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        /* Alert */
        .alert-login {
            display: none;
            font-size: 0.85rem;
            border-radius: 10px;
            border: none;
            padding: 0.7rem 1rem;
            animation: shakeIn 0.4s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 2FA Section */
        .twofa-input {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 700;
            padding: 0.8rem !important;
        }

        .twofa-hint {
            text-align: center;
            color: #8c8c9e;
            font-size: 0.82rem;
            margin-top: 0.5rem;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #f0f0f5;
        }

        .login-footer small {
            color: #b0b0c0;
            font-size: 0.75rem;
        }

        /* Mobile */
        @media (max-width: 480px) {
            .login-card { margin: 1rem; padding: 2rem 1.5rem 1.5rem; }
            .login-logo svg { width: 80px; height: 80px; }
            .login-logo h3 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="bg-particles" id="particles"></div>

    <div class="login-card">
        <div class="login-logo">
            <!-- Nexus N logo with network/constellation design -->
            <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff2d78;stop-opacity:0.6" />
                        <stop offset="100%" style="stop-color:#0d6efd;stop-opacity:0.6" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- Background circle -->
                <circle cx="60" cy="60" r="56" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.3"/>
                <!-- Network lines -->
                <g stroke="url(#grad2)" stroke-width="1" opacity="0.5">
                    <line x1="30" y1="28" x2="55" y2="45"/>
                    <line x1="55" y1="45" x2="90" y2="28"/>
                    <line x1="55" y1="45" x2="65" y2="75"/>
                    <line x1="65" y1="75" x2="90" y2="92"/>
                    <line x1="30" y1="92" x2="65" y2="75"/>
                    <line x1="30" y1="28" x2="18" y2="55"/>
                    <line x1="18" y1="55" x2="30" y2="92"/>
                    <line x1="90" y1="28" x2="102" y2="55"/>
                    <line x1="102" y1="55" x2="90" y2="92"/>
                    <line x1="55" y1="45" x2="18" y2="55"/>
                    <line x1="65" y1="75" x2="102" y2="55"/>
                </g>
                <!-- N letter -->
                <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
                    font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="48"
                    fill="url(#grad1)" filter="url(#glow)">N</text>
                <!-- Network nodes -->
                <g filter="url(#glow)">
                    <circle cx="30" cy="28" r="4" fill="#ff2d78"/>
                    <circle cx="90" cy="28" r="4" fill="#ff2d78"/>
                    <circle cx="55" cy="45" r="3.5" fill="#e91e63"/>
                    <circle cx="65" cy="75" r="3.5" fill="#0d6efd"/>
                    <circle cx="30" cy="92" r="4" fill="#0d6efd"/>
                    <circle cx="90" cy="92" r="4" fill="#0d6efd"/>
                    <circle cx="18" cy="55" r="3" fill="#ff2d78" opacity="0.7"/>
                    <circle cx="102" cy="55" r="3" fill="#0d6efd" opacity="0.7"/>
                </g>
                <!-- Small decorative dots -->
                <circle cx="42" cy="35" r="1.5" fill="#ff2d78" opacity="0.4"/>
                <circle cx="78" cy="35" r="1.5" fill="#ff2d78" opacity="0.4"/>
                <circle cx="48" cy="82" r="1.5" fill="#0d6efd" opacity="0.4"/>
                <circle cx="78" cy="82" r="1.5" fill="#0d6efd" opacity="0.4"/>
            </svg>
            <h3>NEXUS</h3>
            <p>Faca login para continuar</p>
        </div>

        <div class="alert alert-danger alert-login" id="loginErro" role="alert"></div>

        <form id="loginForm" autocomplete="on">
            <div id="loginFields">
                <label class="login-label">Usuario</label>
                <div class="login-input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="inputUsuario" placeholder="seu.usuario" required autofocus autocomplete="username" maxlength="100" pattern="\S+">
                </div>

                <label class="login-label">Senha</label>
                <div class="login-input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="inputSenha" placeholder="Digite sua senha" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div id="twoFaFields" style="display:none">
                <label class="login-label"><i class="bi bi-shield-lock me-1"></i>Codigo 2FA</label>
                <div class="login-input-group">
                    <input type="text" class="twofa-input" id="input2fa" placeholder="000000" maxlength="6" autocomplete="one-time-code">
                </div>
                <p class="twofa-hint">Digite o codigo do seu app autenticador</p>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="login-footer">
            <small>Nexus &copy; 2025</small>
        </div>
    </div>

    <script>
    // Toggle password visibility
    function toggleSenha() {
        const input = document.getElementById('inputSenha');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

    // Generate floating particles
    (function() {
        const container = document.getElementById('particles');
        const colors = ['#ff2d78', '#e91e63', '#0d6efd', '#6c63ff'];
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.animationDuration = (Math.random() * 10 + 8) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(p);
        }
    })();
    </script>
    <script src="/js/login.js"></script>
</body>
</html>
