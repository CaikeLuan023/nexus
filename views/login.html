<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
            background: radial-gradient(ellipse at 50% 50%, #150535 0%, #0d0221 40%, #050110 100%);
        }

        /* Canvas background */
        #nexusCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: auto;
        }

        /* Login card - glass morphism */
        .login-card {
            background: rgba(13, 2, 33, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 45, 120, 0.15);
            border-radius: 20px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6), 0 0 80px rgba(255, 45, 120, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 2.5rem 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: cardEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .login-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .login-logo .logo-network {
            width: 200px;
            height: 200px;
            margin: 0 auto 0.4rem;
            position: relative;
        }

        .login-logo .logo-network canvas {
            width: 100%;
            height: 100%;
        }

        .login-logo .logo-network .n-letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(180deg, #c84bff 0%, #ff2d78 50%, #7b2fbe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            user-select: none;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(200, 75, 255, 0.5)) drop-shadow(0 0 40px rgba(255, 45, 120, 0.3));
        }

        .login-logo h3 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin: 0;
            background: linear-gradient(135deg, #ff2d78, #e91e63, #7b2fbe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.88rem;
            margin-top: 0.3rem;
        }

        /* Form inputs */
        .login-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.4rem;
        }

        .login-input-group {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .login-input-group .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            transition: color 0.3s;
            z-index: 2;
        }

        .login-input-group input {
            width: 100%;
            padding: 0.8rem 0.8rem 0.8rem 2.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
            color: #fff;
        }

        .login-input-group input::placeholder { color: rgba(255, 255, 255, 0.25); }

        .login-input-group input:focus {
            outline: none;
            border-color: #ff2d78;
            background: rgba(255, 45, 120, 0.06);
            box-shadow: 0 0 0 3px rgba(255, 45, 120, 0.15), 0 0 20px rgba(255, 45, 120, 0.1);
        }

        .login-input-group input:focus ~ .input-icon { color: #ff2d78; }

        /* Password toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 0;
            font-size: 1.1rem;
            z-index: 2;
            transition: color 0.2s;
        }

        .toggle-password:hover { color: #ff2d78; }

        /* Button - Neon Pink gradient */
        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #ff2d78, #e91e63, #7b2fbe);
            background-size: 200% 200%;
            animation: btnShimmer 3s ease infinite;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        @keyframes btnShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 45, 120, 0.5), 0 0 40px rgba(255, 45, 120, 0.2);
            color: #fff;
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(255, 45, 120, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            transform: none;
            box-shadow: none;
            animation: none;
        }

        /* Alert */
        .alert-login {
            display: none;
            font-size: 0.85rem;
            border-radius: 10px;
            border: 1px solid rgba(220, 53, 69, 0.3);
            padding: 0.7rem 1rem;
            background: rgba(220, 53, 69, 0.15);
            color: #ff8a9b;
            animation: shakeIn 0.4s ease;
        }

        @keyframes shakeIn {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 2FA Section */
        .twofa-input {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 700;
            padding: 0.8rem !important;
        }

        .twofa-hint {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.82rem;
            margin-top: 0.5rem;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .login-footer small { color: rgba(255, 255, 255, 0.25); font-size: 0.75rem; }

        /* (mini globe canvas animations handled in JS) */

        /* Mobile */
        @media (max-width: 480px) {
            .login-card { margin: 1rem; padding: 2rem 1.5rem 1.5rem; }
            .login-logo .logo-icon { width: 90px; height: 90px; }
            .login-logo h3 { font-size: 1.4rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <script>
    // Limpar caches antigos e forcar atualizacao do Service Worker
    if ('serviceWorker' in navigator) {
        caches.keys().then(function(keys) {
            keys.forEach(function(k) { caches.delete(k); });
        });
        navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) { reg.unregister(); });
        });
    }
    </script>
    <!-- Canvas: 3D Globe + Interactive Particles -->
    <canvas id="nexusCanvas"></canvas>

    <div class="login-card">
        <div class="login-logo">
            <div class="logo-network">
                <canvas id="logoCanvas" width="400" height="400"></canvas>
                <span class="n-letter">N</span>
            </div>
            <h3>Nexus</h3>
            <p>Faca login para continuar</p>
        </div>

        <div class="alert alert-danger alert-login" id="loginErro" role="alert"></div>

        <form id="loginForm" autocomplete="on">
            <div id="loginFields">
                <label class="login-label">Usuario</label>
                <div class="login-input-group">
                    <i class="bi bi-person input-icon"></i>
                    <input type="text" id="inputUsuario" placeholder="seu.usuario" required autofocus autocomplete="username" maxlength="100" pattern="\S+">
                </div>

                <label class="login-label">Senha</label>
                <div class="login-input-group">
                    <i class="bi bi-lock input-icon"></i>
                    <input type="password" id="inputSenha" placeholder="Digite sua senha" required autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="toggleSenha()" tabindex="-1">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div id="twoFaFields" style="display:none">
                <label class="login-label"><i class="bi bi-shield-lock me-1"></i>Codigo 2FA</label>
                <div class="login-input-group">
                    <input type="text" class="twofa-input" id="input2fa" placeholder="000000" maxlength="6" autocomplete="one-time-code">
                </div>
                <p class="twofa-hint">Digite o codigo do seu app autenticador</p>
            </div>

            <button type="submit" class="btn btn-login" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>

        <div class="login-footer">
            <small>Nexus &copy; 2025</small>
        </div>
    </div>

    <script src="/js/logo-sphere.js"></script>
    <script src="/js/login-canvas.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
