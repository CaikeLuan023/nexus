<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-brand i {
            font-size: 3rem;
            color: #f59e0b;
        }
        .login-brand h4 {
            color: #1a1a2e;
            font-weight: 700;
            margin-top: 0.5rem;
        }
        .login-brand p {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .form-control:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 8px;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #d97706, #b45309);
        }
        .alert-login {
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <i class="bi bi-clipboard-data"></i>
            <h4>Nexus</h4>
            <p>Faca login para continuar</p>
        </div>

        <div class="alert alert-danger alert-login" id="loginErro" role="alert"></div>

        <form id="loginForm">
            <div id="loginFields">
                <div class="mb-3">
                    <label class="form-label fw-medium">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="inputUsuario" placeholder="seu.usuario" required autofocus autocomplete="username" maxlength="100" pattern="\S+">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Senha</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="inputSenha" placeholder="Digite sua senha" required>
                    </div>
                </div>
            </div>
            <div id="twoFaFields" style="display:none">
                <div class="mb-4">
                    <label class="form-label fw-medium"><i class="bi bi-shield-lock me-1"></i>Codigo 2FA</label>
                    <input type="text" class="form-control text-center fs-4" id="input2fa" placeholder="000000" maxlength="6" autocomplete="one-time-code">
                    <small class="text-muted">Digite o codigo do seu app autenticador</small>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100" id="btnLogin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
            </button>
        </form>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
