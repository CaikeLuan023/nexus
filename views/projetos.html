<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-kanban me-2"></i>Projetos</h2>
            <div class="d-flex gap-2">
                <div class="btn-group" role="group">
                    <button class="btn btn-outline-secondary btn-sm active" id="btnVistaLista" onclick="setProjetosVistaLista()"><i class="bi bi-table"></i></button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnVistaKanban" onclick="setProjetosVistaKanban()"><i class="bi bi-kanban"></i></button>
                </div>
                <button class="btn btn-primary" onclick="abrirModalProjeto()">
                    <i class="bi bi-plus-lg me-1"></i> Novo Projeto
                </button>
            </div>
        </div>

        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Status</label>
                    <select class="form-select form-select-sm" id="filtroStatus">
                        <option value="">Todos</option>
                        <option value="em_andamento">Em Andamento</option>
                        <option value="pausado">Pausado</option>
                        <option value="concluido">Concluído</option>
                        <option value="cancelado">Cancelado</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('filtroStatus').value=''; carregarProjetos()">Limpar</button>
                </div>
            </div>
        </div>

        <div id="vistaListaProjetos" class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Título</th>
                            <th>Provedor</th>
                            <th>Prioridade</th>
                            <th>Progresso</th>
                            <th>Status</th>
                            <th>Início</th>
                            <th>Previsão</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaProjetos">
                        <tr><td colspan="9" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Kanban Board Projetos -->
        <div id="vistaKanbanProjetos" class="kanban-board" style="display:none"></div>
    </main>

    <!-- Modal Projeto -->
    <div class="modal fade" id="modalProjeto" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalProjetoTitulo">Novo Projeto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="projetoId">
                    <div class="mb-3">
                        <label class="form-label">Título *</label>
                        <input type="text" class="form-control" id="projetoTitulo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea class="form-control" id="projetoDescricao" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Provedor (selecionar cadastrado)</label>
                        <select class="form-select" id="projetoProvedor"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ou digitar nome do provedor</label>
                        <input type="text" class="form-control" id="projetoProvedorManual" placeholder="Digite o nome se não estiver na lista acima">
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Prioridade</label>
                            <select class="form-select" id="projetoPrioridade">
                                <option value="baixa">Baixa</option>
                                <option value="media" selected>Média</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="projetoStatus">
                                <option value="em_andamento">Em Andamento</option>
                                <option value="pausado">Pausado</option>
                                <option value="concluido">Concluído</option>
                                <option value="cancelado">Cancelado</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Responsavel</label>
                            <select class="form-select" id="projetoResponsavel"><option value="">Nenhum</option></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Data Início *</label>
                            <input type="date" class="form-control" id="projetoDataInicio" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Previsão de Conclusão</label>
                            <input type="date" class="form-control" id="projetoDataPrevisao">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Progresso: <span id="projetoPercentualLabel">0</span>%</label>
                            <input type="range" class="form-range" id="projetoPercentual" min="0" max="100" step="5" value="0"
                                   oninput="document.getElementById('projetoPercentualLabel').textContent = this.value">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarProjeto()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalhes Projeto -->
    <div class="modal fade" id="modalDetalhesProjeto" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do Projeto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalhesProjetoConteudo"></div>
                <hr>
                <div class="px-3 pb-2">
                    <h6><i class="bi bi-chat-dots me-1"></i>Comentarios</h6>
                    <div class="comentarios-timeline" id="projetoComentarios"></div>
                    <div class="d-flex gap-2 mt-2">
                        <input type="text" class="form-control form-control-sm" id="novoComentarioProjeto" placeholder="Escreva um comentario...">
                        <button class="btn btn-sm btn-primary text-nowrap" onclick="enviarComentarioProjeto()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <form id="formAnexoProjeto" class="d-flex gap-2 me-auto">
                        <input type="file" class="form-control form-control-sm" id="inputAnexoProjeto" multiple accept="image/*,.pdf">
                        <button type="submit" class="btn btn-sm btn-outline-primary text-nowrap">
                            <i class="bi bi-upload"></i> Anexar
                        </button>
                    </form>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/projetos.js"></script>
</body>
</html>
