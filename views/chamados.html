<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamados - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-ticket-detailed me-2"></i>Chamados</h2>
            <div class="d-flex gap-2">
                <div class="btn-group" role="group">
                    <button class="btn btn-outline-secondary btn-sm active" id="btnVistaTabela" onclick="setVistaTabela()"><i class="bi bi-table"></i></button>
                    <button class="btn btn-outline-secondary btn-sm" id="btnVistaKanban" onclick="setVistaKanban()"><i class="bi bi-kanban"></i></button>
                </div>
                <button class="btn btn-primary" onclick="abrirModalChamado()">
                    <i class="bi bi-plus-lg me-1"></i> Novo Chamado
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filter-bar">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Provedor</label>
                    <select class="form-select form-select-sm" id="filtroProvedor"><option value="">Todos</option></select>
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Categoria</label>
                    <select class="form-select form-select-sm" id="filtroCategoria">
                        <option value="">Todas</option>
                        <option value="usuario">Usuário</option>
                        <option value="app">App</option>
                        <option value="integracao">Integração</option>
                        <option value="canal">Canal</option>
                        <option value="troca_senha">Troca de Senha/Email</option>
                        <option value="email_ativacao">Email Ativação</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Status</label>
                    <select class="form-select form-select-sm" id="filtroStatus">
                        <option value="">Todos</option>
                        <option value="pendente">Pendente</option>
                        <option value="em_andamento">Em Andamento</option>
                        <option value="resolvido">Resolvido</option>
                        <option value="fechado">Fechado</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label form-label-sm">Prioridade</label>
                    <select class="form-select form-select-sm" id="filtroPrioridade">
                        <option value="">Todas</option>
                        <option value="baixa">Baixa</option>
                        <option value="normal">Normal</option>
                        <option value="alta">Alta</option>
                        <option value="critica">Critica</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Data Início</label>
                    <input type="date" class="form-control form-control-sm" id="filtroDataInicio">
                </div>
                <div class="col-md-2">
                    <label class="form-label form-label-sm">Data Fim</label>
                    <input type="date" class="form-control form-control-sm" id="filtroDataFim">
                </div>
                <div class="col-md-1">
                    <button class="btn btn-sm btn-outline-secondary w-100" onclick="limparFiltros()">Limpar</button>
                </div>
                <div class="col-md-1">
                    <button class="btn btn-sm btn-outline-danger w-100" onclick="gerarPDFChamados()"><i class="bi bi-file-pdf me-1"></i>PDF</button>
                </div>
            </div>
        </div>

        <!-- Tabela -->
        <div id="vistaTabela" class="table-container">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Provedor</th>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Prioridade</th>
                            <th>Status</th>
                            <th>SLA</th>
                            <th>Abertura</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaChamados">
                        <tr><td colspan="9" class="text-center text-muted py-4">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Kanban -->
        <div id="vistaKanban" class="kanban-board" style="display:none"></div>
    </main>

    <!-- Modal Criar/Editar Chamado -->
    <div class="modal fade" id="modalChamado" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalChamadoTitulo">Novo Chamado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="chamadoId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Provedor *</label>
                            <div class="input-group">
                                <select class="form-select" id="chamadoProvedor" required></select>
                                <button class="btn btn-outline-success" type="button" onclick="abrirModalNovoProvedor()" title="Cadastrar novo provedor">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Categoria *</label>
                            <select class="form-select" id="chamadoCategoria" required>
                                <option value="">Selecione...</option>
                                <option value="usuario">Problema com Usuário</option>
                                <option value="app">Problema com App</option>
                                <option value="integracao">Problema de Integração</option>
                                <option value="canal">Problema com Canal</option>
                                <option value="troca_senha">Troca de Senha / Email não recebido</option>
                                <option value="email_ativacao">Email de Ativação não recebido</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Título *</label>
                            <input type="text" class="form-control" id="chamadoTitulo" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="chamadoDescricao" rows="3"></textarea>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Prioridade</label>
                            <select class="form-select" id="chamadoPrioridade">
                                <option value="baixa">Baixa</option>
                                <option value="normal" selected>Normal</option>
                                <option value="alta">Alta</option>
                                <option value="critica">Critica</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Responsavel</label>
                            <select class="form-select" id="chamadoResponsavel"><option value="">Nenhum</option></select>
                        </div>
                        <div class="col-md-4" id="campoStatus" style="display:none">
                            <label class="form-label">Status</label>
                            <select class="form-select" id="chamadoStatus">
                                <option value="pendente">Pendente</option>
                                <option value="em_andamento">Em Andamento</option>
                                <option value="resolvido">Resolvido</option>
                                <option value="fechado">Fechado</option>
                            </select>
                        </div>
                        <div class="col-md-6" id="campoResolucao" style="display:none">
                            <label class="form-label">Resolução</label>
                            <textarea class="form-control" id="chamadoResolucao" rows="2"></textarea>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarChamado()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detalhes Chamado -->
    <div class="modal fade" id="modalDetalhes" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do Chamado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalhesConteudo"></div>
                <div class="px-3 pb-2" id="slaBannerContainer"></div>
                <hr>
                <div class="px-3 pb-2">
                    <h6><i class="bi bi-chat-dots me-1"></i>Comentarios</h6>
                    <div class="comentarios-timeline" id="chamadoComentarios"></div>
                    <div class="d-flex gap-2 mt-2">
                        <input type="text" class="form-control form-control-sm" id="novoComentarioChamado" placeholder="Escreva um comentario...">
                        <button class="btn btn-sm btn-primary text-nowrap" onclick="enviarComentarioChamado()">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-footer">
                    <form id="formAnexo" class="d-flex gap-2 me-auto">
                        <input type="file" class="form-control form-control-sm" id="inputAnexo" multiple accept="image/*,.pdf">
                        <button type="submit" class="btn btn-sm btn-outline-primary text-nowrap">
                            <i class="bi bi-upload"></i> Anexar
                        </button>
                    </form>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Novo Provedor (rápido) -->
    <div class="modal fade" id="modalNovoProvedor" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-building me-2"></i>Novo Provedor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nome do Provedor *</label>
                            <input type="text" class="form-control" id="novoProvedorNome" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Contato WhatsApp</label>
                            <input type="text" class="form-control" id="novoProvedorContato" placeholder="5511999998888">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Plano</label>
                            <select class="form-select" id="novoProvedorPlano">
                                <option value="">Selecione...</option>
                                <option value="zapping_lite_plus">Zapping Lite Plus</option>
                                <option value="zapping_full">Zapping Full</option>
                                <option value="liteplus_full">Lite Plus + Full</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Modelo de Integração</label>
                            <select class="form-select" id="novoProvedorModelo">
                                <option value="">Selecione...</option>
                                <option value="bundle">Bundle</option>
                                <option value="hardbundle">Hardbundle</option>
                                <option value="reseller">Reseller</option>
                                <option value="hospitality">Hospitality</option>
                                <option value="empresas">Empresas</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ERP</label>
                            <select class="form-select" id="novoProvedorERP">
                                <option value="">Selecione...</option>
                                <option value="ixc">IXC</option>
                                <option value="hubsoft">Hubsoft</option>
                                <option value="radius_net">Radius NET</option>
                                <option value="sgp">SGP</option>
                                <option value="atlaz">Atlaz</option>
                                <option value="ispfy">ISPFY</option>
                                <option value="mycore">MYCORE</option>
                                <option value="mk_auth">Mk-auth</option>
                                <option value="proprio">Próprio</option>
                                <option value="voalle">Voalle</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Adicionais</label>
                            <div class="d-flex flex-wrap gap-3 mt-1">
                                <div class="form-check">
                                    <input class="form-check-input novo-prov-add" type="checkbox" value="telecine" id="npAddTelecine">
                                    <label class="form-check-label" for="npAddTelecine">Telecine</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input novo-prov-add" type="checkbox" value="combate" id="npAddCombate">
                                    <label class="form-check-label" for="npAddCombate">Combate</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input novo-prov-add" type="checkbox" value="canais_adultos" id="npAddAdultos">
                                    <label class="form-check-label" for="npAddAdultos">Canais Adultos</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input novo-prov-add" type="checkbox" value="premiere" id="npAddPremiere">
                                    <label class="form-check-label" for="npAddPremiere">Premiere</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input novo-prov-add" type="checkbox" value="sportv_plus" id="npAddSportv">
                                    <label class="form-check-label" for="npAddSportv">Sportv+</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-success" onclick="salvarNovoProvedor()">
                        <i class="bi bi-check-lg me-1"></i>Cadastrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Confirmação -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <i class="bi bi-exclamation-triangle text-warning fs-1 mb-3 d-block"></i>
                    <p id="confirmMessage"></p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" id="confirmBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Imagem Ampliada (Galeria) -->
    <div class="modal fade" id="modalImagem" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content bg-transparent border-0">
                <div class="modal-body text-center p-0 position-relative">
                    <button class="btn btn-light position-absolute galeria-nav" style="left:10px;top:50%;transform:translateY(-50%);z-index:10;opacity:0.8" onclick="galeriaAnterior()">
                        <i class="bi bi-chevron-left fs-4"></i>
                    </button>
                    <img id="imagemAmpliada" src="" class="img-fluid rounded" style="max-height:90vh">
                    <button class="btn btn-light position-absolute galeria-nav" style="right:10px;top:50%;transform:translateY(-50%);z-index:10;opacity:0.8" onclick="galeriaProxima()">
                        <i class="bi bi-chevron-right fs-4"></i>
                    </button>
                    <div id="galeriaCounter" class="text-light mt-2" style="font-size:0.9rem"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/chamados.js"></script>
</body>
</html>
