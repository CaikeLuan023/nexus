<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS - Nexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="/icons/icon-192.svg">
</head>
<body>
    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <nav class="sidebar" id="mainSidebar"></nav>

    <main class="main-content">
        <div class="page-header">
            <h2><i class="bi bi-star me-2"></i>NPS - Satisfacao</h2>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary btn-sm" onclick="enviarNPSMassa()">
                    <i class="bi bi-send me-1"></i>Gerar Pesquisas
                </button>
                <button class="btn btn-primary btn-sm" onclick="carregarNPS()">
                    <i class="bi bi-arrow-clockwise me-1"></i>Atualizar
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filter-bar mb-3">
            <div class="row g-2 align-items-end">
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Periodo</label>
                    <input type="month" class="form-control form-control-sm" id="npsFiltroMes" onchange="carregarNPS()">
                </div>
                <div class="col-md-3">
                    <label class="form-label form-label-sm">Provedor</label>
                    <select class="form-select form-select-sm" id="npsFiltroProvedor" onchange="carregarNPS()">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- NPS Score Grande -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card text-center p-4">
                    <div id="npsScoreGauge" class="mb-2">
                        <div class="display-3 fw-bold" id="npsScoreValor">--</div>
                    </div>
                    <h5 class="mb-1">NPS Score</h5>
                    <small class="text-muted" id="npsScoreLabel">Sem dados</small>
                </div>
            </div>
            <div class="col-md-2 col-6">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-success" id="npsPromotores">0</div>
                    <small class="text-muted">Promotores (9-10)</small>
                </div>
            </div>
            <div class="col-md-2 col-6">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-warning" id="npsNeutros">0</div>
                    <small class="text-muted">Neutros (7-8)</small>
                </div>
            </div>
            <div class="col-md-2 col-6">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-danger" id="npsDetratores">0</div>
                    <small class="text-muted">Detratores (0-6)</small>
                </div>
            </div>
            <div class="col-md-2 col-6">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-info" id="npsPendentes">0</div>
                    <small class="text-muted">Pendentes</small>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <h6><i class="bi bi-bar-chart me-1"></i>Distribuicao de Notas</h6>
                    <div class="chart-container">
                        <canvas id="chartNPSDistribuicao"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <h6><i class="bi bi-graph-up me-1"></i>Evolucao NPS</h6>
                    <div class="chart-container">
                        <canvas id="chartNPSEvolucao"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- NPS por Provedor + Ultimas Respostas -->
        <div class="row g-3 mb-4">
            <div class="col-md-5">
                <div class="chart-card">
                    <h6><i class="bi bi-building me-1"></i>NPS por Provedor</h6>
                    <div id="npsProvedorContainer">
                        <div class="text-center text-muted py-3">Carregando...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="chart-card">
                    <h6><i class="bi bi-chat-dots me-1"></i>Ultimas Respostas</h6>
                    <div id="npsRespostasContainer">
                        <div class="text-center text-muted py-3">Carregando...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/nps.js"></script>
</body>
</html>
