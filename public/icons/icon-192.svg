<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#111d33"/>
    </linearGradient>
    <linearGradient id="nxG" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7bd5"/>
      <stop offset="100%" stop-color="#00D2FF"/>
    </linearGradient>
    <linearGradient id="nxGL" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00D2FF" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <rect width="192" height="192" rx="29" fill="url(#bg)"/>

  <g transform="translate(46, 24)">
    <!-- N main strokes -->
    <g stroke="url(#nxG)" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="20" y1="120" x2="20" y2="16"/>
      <line x1="20" y1="16" x2="80" y2="120"/>
      <line x1="80" y1="120" x2="80" y2="16"/>
    </g>

    <!-- Network branches -->
    <g stroke="url(#nxGL)" stroke-width="1.5" stroke-linecap="round" fill="none">
      <line x1="20" y1="16" x2="6" y2="4"/>
      <line x1="20" y1="16" x2="40" y2="3"/>
      <line x1="80" y1="16" x2="60" y2="3"/>
      <line x1="80" y1="16" x2="94" y2="4"/>
      <line x1="40" y1="3" x2="60" y2="3"/>
      <line x1="20" y1="68" x2="6" y2="56"/>
      <line x1="20" y1="68" x2="7" y2="80"/>
      <line x1="80" y1="68" x2="94" y2="56"/>
      <line x1="80" y1="68" x2="93" y2="80"/>
      <line x1="40" y1="48" x2="28" y2="36"/>
      <line x1="60" y1="88" x2="72" y2="100"/>
      <line x1="20" y1="120" x2="8" y2="130"/>
      <line x1="80" y1="120" x2="92" y2="130"/>
    </g>

    <!-- Main N vertex nodes -->
    <circle cx="20" cy="120" r="5" fill="#3a7bd5"/>
    <circle cx="20" cy="16" r="5.5" fill="#00B4D8"/>
    <circle cx="80" cy="120" r="5" fill="#3a7bd5"/>
    <circle cx="80" cy="16" r="5.5" fill="#00D2FF"/>

    <!-- Mid nodes -->
    <circle cx="20" cy="68" r="3.5" fill="#00B4D8"/>
    <circle cx="80" cy="68" r="3.5" fill="#3a7bd5"/>
    <circle cx="50" cy="68" r="3.5" fill="#00A8CC"/>
    <circle cx="40" cy="48" r="3" fill="#00C2E0"/>
    <circle cx="60" cy="88" r="3" fill="#3a7bd5"/>

    <!-- Branch endpoints -->
    <circle cx="6" cy="4" r="2.5" fill="#00D2FF" opacity="0.8"/>
    <circle cx="40" cy="3" r="2.5" fill="#00C2E0" opacity="0.8"/>
    <circle cx="60" cy="3" r="2.5" fill="#00A8CC" opacity="0.8"/>
    <circle cx="94" cy="4" r="2.5" fill="#3a7bd5" opacity="0.8"/>
    <circle cx="6" cy="56" r="2" fill="#00D2FF" opacity="0.6"/>
    <circle cx="7" cy="80" r="2" fill="#00D2FF" opacity="0.5"/>
    <circle cx="94" cy="56" r="2" fill="#3a7bd5" opacity="0.6"/>
    <circle cx="93" cy="80" r="2" fill="#3a7bd5" opacity="0.5"/>
    <circle cx="28" cy="36" r="2" fill="#00C2E0" opacity="0.5"/>
    <circle cx="72" cy="100" r="2" fill="#3a7bd5" opacity="0.5"/>
    <circle cx="8" cy="130" r="2" fill="#3a7bd5" opacity="0.6"/>
    <circle cx="92" cy="130" r="2" fill="#3a7bd5" opacity="0.6"/>
  </g>

  <!-- NEXUS text -->
  <text x="96" y="176" text-anchor="middle"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-weight="800" font-size="24" letter-spacing="5"
    fill="url(#nxG)">NEXUS</text>
</svg>
